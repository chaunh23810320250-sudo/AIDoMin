<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dò Mìn & Trợ Lý AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #2c3e50; margin-bottom: 5px; text-align: center; }
        p.subtitle { color: #7f8c8d; margin-bottom: 20px; text-align: center; }
        
        .main-wrapper { display: flex; gap: 30px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 1000px; width: 100%; flex-wrap: wrap; }
        
        /* Cột trái: Bàn cờ */
        .game-section { flex: 1; min-width: 350px; display: flex; flex-direction: column; align-items: center; }
        .board { display: grid; gap: 2px; background: #7f8c8d; border: 3px solid #34495e; padding: 3px; border-radius: 5px; }
        .coord { display: flex; justify-content: center; align-items: center; font-weight: bold; color: #2c3e50; background: #ecf0f1; font-size: 14px; user-select: none; }
        .cell { display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; background: #bdc3c7; border: 3px inset #ecf0f1; cursor: pointer; user-select: none; transition: background 0.1s; }
        .cell:hover { background: #d5dbdb; }
        .cell.revealed { background: #ecf0f1; border: 1px solid #bdc3c7; cursor: default; }
        .cell.flagged { background: #bdc3c7; color: #c0392b; }
        
        /* Hiệu ứng do AI chỉ điểm */
        .cell.ai-safe { background: #a2f0c2 !important; border: 2px solid #2ecc71; box-shadow: inset 0 0 10px #2ecc71; animation: pulseSafe 1.5s infinite; }
        .cell.ai-mine { background: #f5b7b1 !important; border: 2px solid #e74c3c; box-shadow: inset 0 0 10px #e74c3c; }

        @keyframes pulseSafe { 0% { opacity: 0.8; } 50% { opacity: 1; background: #7bed9f; } 100% { opacity: 0.8; } }

        /* Màu số */
        .num-1 { color: #2980b9; } .num-2 { color: #27ae60; } .num-3 { color: #c0392b; } .num-4 { color: #8e44ad; }

        /* Cột phải: Bảng điều khiển */
        .panel-section { flex: 1; min-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .controls { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; color: white; }
        .btn-restart { background: #34495e; } .btn-restart:hover { background: #2c3e50; }
        .btn-ai { background: #e67e22; font-size: 16px; box-shadow: 0 4px 0 #d35400; margin-bottom: 4px; }
        .btn-ai:hover { background: #d35400; transform: translateY(2px); box-shadow: 0 2px 0 #e67e22; }
        .btn-ai:active { transform: translateY(4px); box-shadow: none; }

        .trace-box { background: #1e272e; color: #d2dae2; padding: 15px; border-radius: 6px; flex-grow: 1; font-family: monospace; font-size: 14px; overflow-y: auto; max-height: 400px; line-height: 1.6; border-left: 5px solid #0fb9b1; }
        .log-step { padding: 8px 0; border-bottom: 1px dashed #485460; }
        .log-safe { color: #0be881; font-weight: bold; }
        .log-mine { color: #ff3f34; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎮 Dò Mìn & Trợ Lý AI</h1>
    <p class="subtitle">Trải nghiệm chơi thực tế - Gọi AI khi bạn bí bước</p>

    <div class="main-wrapper">
        <div class="game-section">
            <div class="board" id="board"></div>
        </div>

        <div class="panel-section">
            <div class="controls">
                <button class="btn-restart" onclick="initGame()">🔄 Chơi ván mới (6x6)</button>
            </div>
            <button class="btn-ai" onclick="askAIAssistant()">🤖 HỎI TRỢ LÝ AI</button>
            <div class="trace-box" id="trace-box">
                <em>// Chơi game bằng cách: <br>- Click trái: Mở ô <br>- Click phải: Cắm cờ 🚩<br><br>Nếu bạn bí, hãy bấm "Hỏi Trợ lý AI" để nhận gợi ý logic.</em>
            </div>
        </div>
    </div>

<script>
    // --- 1. CẤU HÌNH GAME ---
    const ROWS = 6;
    const COLS = 6;
    const MINES_COUNT = 6;
    const CELL_SIZE = 50; // px
    
    let grid = []; // Lưu trạng thái ẩn của trò chơi
    let isGameOver = false;

    // --- 2. LOGIC TRÒ CHƠI ---
    function initGame() {
        isGameOver = false;
        document.getElementById('trace-box').innerHTML = "<em>// Bắt đầu ván mới. Hãy tự mở một vài ô trước khi gọi AI nhé!</em>";
        
        // Tạo lưới rỗng
        grid = Array.from({ length: ROWS }, () => 
            Array.from({ length: COLS }, () => ({
                isMine: false, neighborMines: 0, isRevealed: false, isFlagged: false
            }))
        );

        // Đặt mìn ngẫu nhiên
        let placed = 0;
        while (placed < MINES_COUNT) {
            let r = Math.floor(Math.random() * ROWS);
            let c = Math.floor(Math.random() * COLS);
            if (!grid[r][c].isMine) {
                grid[r][c].isMine = true;
                placed++;
            }
        }

        // Tính số mìn xung quanh mỗi ô
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (!grid[r][c].isMine) {
                    let count = 0;
                    getNeighbors(r, c).forEach(n => { if (grid[n.r][n.c].isMine) count++; });
                    grid[r][c].neighborMines = count;
                }
            }
        }
        renderBoard();
    }

    function getNeighbors(r, c) {
        let neighbors = [];
        for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                if (i === 0 && j === 0) continue;
                let nr = r + i, nc = c + j;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                    neighbors.push({ r: nr, c: nc });
                }
            }
        }
        return neighbors;
    }

    // Xử lý người dùng click trái (Mở ô)
    function revealCell(r, c) {
        if (isGameOver || grid[r][c].isRevealed || grid[r][c].isFlagged) return;
        
        grid[r][c].isRevealed = true;

        if (grid[r][c].isMine) {
            isGameOver = true;
            alert("BÙM! Bạn đạp trúng mìn. Trò chơi kết thúc!");
            revealAllMines();
        } else if (grid[r][c].neighborMines === 0) {
            // Hiệu ứng loang (Flood fill) nếu ô là số 0
            getNeighbors(r, c).forEach(n => revealCell(n.r, n.c));
        }
        renderBoard();
    }

    // Xử lý người dùng click phải (Cắm cờ)
    function toggleFlag(e, r, c) {
        e.preventDefault(); // Chặn menu chuột phải của trình duyệt
        if (isGameOver || grid[r][c].isRevealed) return;
        
        grid[r][c].isFlagged = !grid[r][c].isFlagged;
        renderBoard();
    }

    function revealAllMines() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c].isMine) grid[r][c].isRevealed = true;
            }
        }
        renderBoard();
    }

    // Vẽ giao diện
    function renderBoard() {
        const board = document.getElementById('board');
        board.style.gridTemplateColumns = `30px repeat(${COLS}, ${CELL_SIZE}px)`;
        board.style.gridTemplateRows = `30px repeat(${ROWS}, ${CELL_SIZE}px)`;
        board.innerHTML = '';

        // Góc trên trái
        board.appendChild(createCoord(''));
        // Số cột
        for (let c = 0; c < COLS; c++) board.appendChild(createCoord(c));

        for (let r = 0; r < ROWS; r++) {
            // Số hàng
            board.appendChild(createCoord(r));

            for (let c = 0; c < COLS; c++) {
                let cellData = grid[r][c];
                let div = document.createElement('div');
                div.className = 'cell';
                
                // Giữ lại class highlight của AI nếu có
                if (cellData.aiSafe) div.classList.add('ai-safe');
                if (cellData.aiMine) div.classList.add('ai-mine');

                if (cellData.isRevealed) {
                    div.classList.add('revealed');
                    if (cellData.isMine) {
                        div.innerHTML = '💣';
                        div.style.backgroundColor = '#e74c3c';
                    } else if (cellData.neighborMines > 0) {
                        div.innerHTML = cellData.neighborMines;
                        div.classList.add(`num-${cellData.neighborMines}`);
                    }
                } else if (cellData.isFlagged) {
                    div.classList.add('flagged');
                    div.innerHTML = '🚩';
                }

                // Gắn sự kiện click
                div.onclick = () => revealCell(r, c);
                div.oncontextmenu = (e) => toggleFlag(e, r, c);
                
                board.appendChild(div);
            }
        }
    }

    function createCoord(text) {
        let div = document.createElement('div');
        div.className = 'coord';
        div.innerText = text;
        return div;
    }

    // --- 3. TRỢ LÝ AI (HỆ CHUYÊN GIA LOGIC MỆNH ĐỀ) ---
    function askAIAssistant() {
        if (isGameOver) return;
        const traceBox = document.getElementById('trace-box');
        let traceLog = "";
        let step = 1;
        let aiFoundSomething = false;

        // Xóa các highlight cũ của AI trước khi chạy lượt mới
        for(let r=0; r<ROWS; r++) 
            for(let c=0; c<COLS; c++) {
                grid[r][c].aiSafe = false; 
                grid[r][c].aiMine = false;
            }

        // AI quét các ô ĐÃ MỞ (Working Memory)
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                let cell = grid[r][c];
                if (cell.isRevealed && !cell.isMine && cell.neighborMines > 0) {
                    
                    let num = cell.neighborMines;
                    let neighbors = getNeighbors(r, c);
                    let flagCount = 0;
                    let hiddenCells = []; // Các ô chưa lật & chưa cắm cờ

                    neighbors.forEach(n => {
                        let nCell = grid[n.r][n.c];
                        if (nCell.isFlagged || nCell.aiMine) flagCount++;
                        else if (!nCell.isRevealed && !nCell.aiSafe) hiddenCells.push(n);
                    });

                    if (hiddenCells.length === 0) continue; // Không có gì để phân tích

                    // LUẬT 1: Đủ cờ (Mìn) -> Xung quanh an toàn
                    if (flagCount === num) {
                        let targetLog = hiddenCells.map(h => `(${h.r},${h.c})`).join(', ');
                        traceLog += `<div class="log-step"><strong>[Bước ${step}]</strong> Phân tích ô <strong>(${r},${c})</strong> mang số ${num}:<br>Đã có đủ ${flagCount} cờ xung quanh ➔ Các ô ẩn còn lại chắc chắn <span class="log-safe">AN TOÀN</span>.<br>👉 Gợi ý: Lật ô ${targetLog}</div>`;
                        
                        hiddenCells.forEach(h => grid[h.r][h.c].aiSafe = true);
                        aiFoundSomething = true;
                        step++;
                    }
                    
                    // LUẬT 2: Cờ + Ô ẩn = Số -> Tất cả ô ẩn đều là mìn
                    else if (flagCount + hiddenCells.length === num) {
                        let targetLog = hiddenCells.map(h => `(${h.r},${h.c})`).join(', ');
                        traceLog += `<div class="log-step"><strong>[Bước ${step}]</strong> Phân tích ô <strong>(${r},${c})</strong> mang số ${num}:<br>Đang có ${flagCount} cờ và ${hiddenCells.length} ô ẩn. Trừ đi thì bắt buộc các ô ẩn này <span class="log-mine">LÀ MÌN</span>.<br>👉 Gợi ý: Cắm cờ ô ${targetLog}</div>`;
                        
                        hiddenCells.forEach(h => grid[h.r][h.c].aiMine = true);
                        aiFoundSomething = true;
                        step++;
                    }
                }
            }
        }

        if (aiFoundSomething) {
            traceBox.innerHTML = `<div style="color:#f1c40f; margin-bottom:10px;">🤖 AI đã tìm ra quy luật:</div>` + traceLog;
        } else {
            traceBox.innerHTML = `<div style="color:#e74c3c;">🤖 Trợ lý AI báo cáo:<br>Chưa đủ dữ kiện logic để suy luận bước tiếp theo. Bạn hãy thử "đoán" hoặc click bừa một ô khác xem sao nhé!</div>`;
        }
        
        renderBoard(); // Vẽ lại để cập nhật hiệu ứng highlight màu xanh/đỏ
    }

    // Khởi động khi mở trang
    initGame();
</script>

</body>
</html>
